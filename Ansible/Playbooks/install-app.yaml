- name: Setup DevOps Tools on Azure VM
  hosts: linux
  become: yes

  tasks:

    # -----------------------------
    # Install base packages FIRST
    # -----------------------------
    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - gnupg
          - software-properties-common
          - apt-transport-https
          - ca-certificates
        state: present
        update_cache: yes

    # -----------------------------
    # Add Jenkins repo properly BEFORE apt update again
    # -----------------------------
    - name: Add Jenkins GPG key
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io.key | \
        gpg --dearmor -o /usr/share/keyrings/jenkins.gpg

    - name: Add Jenkins repository
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: |
          deb [signed-by=/usr/share/keyrings/jenkins.gpg] https://pkg.jenkins.io/debian-stable binary/

    # -----------------------------
    # NOW update apt (safe)
    # -----------------------------
    - name: Update apt cache after adding Jenkins repo
      apt:
        update_cache: yes

    # -----------------------------
    # Install Java + Jenkins
    # -----------------------------
    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start Jenkins
      service:
        name: jenkins
        state: started
        enabled: yes

    # -----------------------------
    # Install Docker
    # -----------------------------
    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    # -----------------------------
    # Install kubectl
    # -----------------------------
    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s \
        https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    # -----------------------------
    # Install Terraform
    # -----------------------------
    - name: Add HashiCorp key
      shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | \
        gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg

    - name: Add HashiCorp repo
      copy:
        dest: /etc/apt/sources.list.d/hashicorp.list
        content: |
          deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com jammy main

    - name: Install Terraform
      apt:
        name: terraform
        update_cache: yes

    # -----------------------------
    # Install Azure CLI
    # -----------------------------
    - name: Install Azure CLI
      shell: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | bash