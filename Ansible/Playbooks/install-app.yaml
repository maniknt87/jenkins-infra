- name: Setup DevOps Tools on Azure VM
  hosts: linux
  become: yes

  vars:
    jenkins_keyring: /usr/share/keyrings/jenkins.gpg
    hashicorp_keyring: /usr/share/keyrings/hashicorp.gpg

  tasks:

    # -----------------------------
    # System Update
    # -----------------------------
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - gnupg
          - software-properties-common
          - apt-transport-https
          - ca-certificates
        state: present

    # -----------------------------
    # Install Ansible
    # -----------------------------
    - name: Install Ansible
      apt:
        name: ansible
        state: present

    # -----------------------------
    # Install Java (Jenkins dependency)
    # -----------------------------
    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present

    # -----------------------------
    # Install Jenkins (FIXED METHOD)
    # -----------------------------
    - name: Add Jenkins GPG key
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io.key | \
        gpg --dearmor -o {{ jenkins_keyring }}
      args:
        creates: "{{ jenkins_keyring }}"

    - name: Add Jenkins repository
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: |
          deb [signed-by={{ jenkins_keyring }}] https://pkg.jenkins.io/debian-stable binary/

    - name: Install Jenkins
      apt:
        name: jenkins
        update_cache: yes

    - name: Start Jenkins
      service:
        name: jenkins
        state: started
        enabled: yes

    # -----------------------------
    # Install Docker
    # -----------------------------
    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to Docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    # -----------------------------
    # Install kubectl
    # -----------------------------
    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s \
        https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    # -----------------------------
    # Install Terraform
    # -----------------------------
    - name: Add HashiCorp GPG key
      shell: |
        wget -O- https://apt.releases.hashicorp.com/gpg | \
        gpg --dearmor -o {{ hashicorp_keyring }}
      args:
        creates: "{{ hashicorp_keyring }}"

    - name: Add HashiCorp repo
      copy:
        dest: /etc/apt/sources.list.d/hashicorp.list
        content: |
          deb [signed-by={{ hashicorp_keyring }}] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main

    - name: Install Terraform
      apt:
        name: terraform
        update_cache: yes

    # -----------------------------
    # Install Azure CLI
    # -----------------------------
    - name: Install Azure CLI
      shell: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | bash

    # -----------------------------
    # Verify installations
    # -----------------------------
    - name: Check versions
      shell: |
        echo "Jenkins:" && systemctl status jenkins | grep Active
        echo "Docker:" && docker --version
        echo "Kubectl:" && kubectl version --client
        echo "Terraform:" && terraform version
        echo "Azure CLI:" && az version
        echo "Ansible:" && ansible --version
      register: output

    - debug:
        var: output.stdout_lines