- name: Setup DevOps Tools on Azure VM
  hosts: linux
  become: yes

  vars:
    user_name: azureuser

  tasks:

    # -----------------------------
    # Update & Base Packages
    # -----------------------------
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - gnupg
          - software-properties-common
          - apt-transport-https
          - ca-certificates
        state: present

    # -----------------------------
    # Install Java (Required for Jenkins)
    # -----------------------------
    - name: Install Java
      apt:
        name: openjdk-17-jdk
        state: present

    # -----------------------------
    # Install Jenkins (NO GPG ISSUE METHOD)
    # -----------------------------
    - name: Download Jenkins package
      get_url:
        url: https://pkg.jenkins.io/debian-stable/binary/jenkins_2.452.1_all.deb
        dest: /tmp/jenkins.deb

    - name: Install Jenkins package
      apt:
        deb: /tmp/jenkins.deb
        state: present

    - name: Start Jenkins service
      service:
        name: jenkins
        state: started
        enabled: yes

    # -----------------------------
    # Install Docker
    # -----------------------------
    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to Docker group
      user:
        name: "{{ user_name }}"
        groups: docker
        append: yes

    # -----------------------------
    # Install kubectl
    # -----------------------------
    - name: Get latest kubectl version
      shell: curl -L -s https://dl.k8s.io/release/stable.txt
      register: kubectl_version

    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version.stdout }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    # -----------------------------
    # Install Terraform
    # -----------------------------
    - name: Add HashiCorp GPG key
      shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | \
        gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg

    - name: Add HashiCorp repository
      copy:
        dest: /etc/apt/sources.list.d/hashicorp.list
        content: |
          deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main

    - name: Install Terraform
      apt:
        name: terraform
        update_cache: yes

    # -----------------------------
    # Install Azure CLI
    # -----------------------------
    - name: Install Azure CLI
      shell: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | bash

    # -----------------------------
    # Verify Installation
    # -----------------------------
    - name: Verify installed tools
      shell: |
        echo "Docker:" && docker --version
        echo "Kubectl:" && kubectl version --client
        echo "Terraform:" && terraform version
        echo "Azure CLI:" && az version
      register: output

    - debug:
        var: output.stdout_lines